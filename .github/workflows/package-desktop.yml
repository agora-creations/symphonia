name: Desktop Package

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: package-desktop-${{ github.ref }}
  cancel-in-progress: false

env:
  CI: "true"
  NODE_VERSION: "22"
  PNPM_VERSION: "10.20.0"

jobs:
  package-macos-host:
    name: Package desktop on macOS host
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build package
        run: pnpm validate:packaging

      - name: Archive package
        run: |
          mkdir -p artifacts
          artifact_name="Symphonia-${RUNNER_OS}-${RUNNER_ARCH}.tar.gz"
          tar -czf "artifacts/${artifact_name}" -C apps/desktop/out .
          ls -lh artifacts

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: symphonia-desktop-${{ runner.os }}-${{ runner.arch }}
          path: artifacts/*.tar.gz
          if-no-files-found: error
          retention-days: 14
          include-hidden-files: false
