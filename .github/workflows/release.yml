name: Draft Release

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: "Existing tag to draft, for example v0.1.0"
        required: true
        type: string
      confirmation:
        description: "Type CREATE DRAFT RELEASE"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: draft-release-${{ inputs.release_version }}
  cancel-in-progress: false

env:
  CI: "true"
  NODE_VERSION: "22"
  PNPM_VERSION: "10.20.0"

jobs:
  draft-release:
    name: Create gated draft release
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: Check release confirmation
        env:
          RELEASE_CONFIRMATION: ${{ inputs.confirmation }}
        run: |
          if [ "$RELEASE_CONFIRMATION" != "CREATE DRAFT RELEASE" ]; then
            echo "Release confirmation did not match."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate release version input
        env:
          RELEASE_VERSION: ${{ inputs.release_version }}
        run: |
          if ! printf '%s' "$RELEASE_VERSION" | grep -Eq '^v[0-9]+[.][0-9]+[.][0-9]+([.-][0-9A-Za-z.-]+)?$'; then
            echo "release_version must look like v0.1.0"
            exit 1
          fi

      - name: Verify release tag exists
        env:
          RELEASE_VERSION: ${{ inputs.release_version }}
        run: |
          git rev-parse --verify "refs/tags/${RELEASE_VERSION}"

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run validation
        run: pnpm validate

      - name: Build package artifact
        run: pnpm validate:packaging

      - name: Generate release notes
        env:
          RELEASE_VERSION: ${{ inputs.release_version }}
        run: node scripts/release-notes-preview.mjs "$RELEASE_VERSION" > release-notes.md

      - name: Archive package
        env:
          RELEASE_VERSION: ${{ inputs.release_version }}
        run: |
          mkdir -p artifacts
          artifact_name="Symphonia-${RELEASE_VERSION}-${RUNNER_OS}-${RUNNER_ARCH}.tar.gz"
          tar -czf "artifacts/${artifact_name}" -C apps/desktop/out .
          ls -lh artifacts

      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_VERSION: ${{ inputs.release_version }}
        run: |
          gh release create "$RELEASE_VERSION" artifacts/*.tar.gz \
            --draft \
            --title "Symphonia $RELEASE_VERSION" \
            --notes-file release-notes.md \
            --verify-tag
